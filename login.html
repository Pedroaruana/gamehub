<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - GameHub</title>

<link rel="stylesheet" href="login.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
</head>

<body>

<div class="login-container">

  <div class="logo">🎮 GAMEHUB</div>

  <div class="login-box">

    <div class="tabs">
      <button class="active" id="tabLogin">Entrar</button>
      <button id="tabCreate">Criar conta</button>
    </div>

    <input type="email" id="email" placeholder="E-mail" class="input">
    <input type="password" id="password" placeholder="Senha" class="input">

    <div class="options">
      <label>
        <input type="checkbox">
        Lembrar
      </label>

      <a href="#">Esqueci minha senha</a>
    </div>

    <button class="access-btn" id="btnLogin">Acessar</button>

    <div class="divider">Ou conecte-se via</div>

    <div class="socials">
      <button>Google</button>
      <button>Steam</button>
      <button>Discord</button>
    </div>

  </div>
</div>

<script src="login.js"></script>

</body>
</html>
