<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada – GameHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .code {
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 700;
      line-height: 1;
      color: #00ff9c;
      letter-spacing: -4px;
    }

    .icon {
      font-size: 48px;
      margin: 16px 0 8px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      color: #888;
      font-size: 14px;
      max-width: 340px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .home-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #00ff9c;
      color: #111;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }

    .home-btn:hover {
      background: #00cc7a;
    }

    .footer-note {
      margin-top: 48px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="code">404</div>
  <div class="icon">🎮</div>
  <h1>Página não encontrada</h1>
  <p>Parece que esse jogo saiu de catálogo. A página que você procura não existe ou foi movida.</p>
  <a href="index.html" class="home-btn">Voltar para a loja</a>

  <div class="footer-note">GameHub</div>

</body>
</html>
